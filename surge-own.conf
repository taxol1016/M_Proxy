dns-server = 119.29.29.29, 223.5.5.5
bypass-system = true
proxy-test-url = http://www.gstatic.com/generate_204
encrypted-dns-server = https://wrecking7857.com:44443/dns-query/960b5417-167f-4477-9525-525294ab5afb, https://carrousel6917.com:44443/dns-query/960b5417-167f-4477-9525-525294ab5afb, https://simmering3378.com:443/dns-query/960b5417-167f-4477-9525-525294ab5afb
